name: VPS Auto Backup Starter

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.FILEBASE_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.FILEBASE_SECRET_KEY }}
      FILEBASE_BUCKET: ${{ secrets.FILEBASE_BUCKET }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y zip unzip curl wget

          # Install AWS CLI
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --update

      - name: Prepare VPS Folder
        run: |
          mkdir -p vps_data
          # You can put starter files here if you want
          echo "This is a starter VPS folder" > vps_data/readme.txt

      - name: Backup to Filebase
        run: |
          zip -r vps_backup.zip vps_data
          aws --endpoint-url=https://s3.filebase.com s3 cp vps_backup.zip s3://$FILEBASE_BUCKET/vps_backup.zip
